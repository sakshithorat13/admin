<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HealthOps — Admin Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#1D9E75;--gd:#0F6E56;--gp:#085041;--gl:#E1F5EE;--gm:#9FE1CB;
  --bg:#F0F4F2;--su:#FFFFFF;--su2:#F7FAF8;
  --bd:#DDE8E4;--bd2:#C4D6D0;
  --tx:#0C1C18;--t2:#4A6560;--t3:#90ADAA;
  --rd:#DC3545;--rb:#FEF0F0;
  --am:#D97706;--ab:#FFFBEB;
  --bl:#2563EB;--bb:#EFF6FF;
  --r:12px;--rs:8px;--rx:5px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shm:0 4px 16px rgba(0,0,0,.08);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;outline:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px;outline:none}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ani{animation:fadeIn .2s ease}
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,signInWithEmailAndPassword,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,collection,doc,getDoc,getDocs,addDoc,deleteDoc,updateDoc,query,where,orderBy,serverTimestamp,onSnapshot}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp({
  apiKey:"AIzaSyDMGHzqfzfRD_VvPqQh6NwecLGLxqKjskU",
  authDomain:"healthops-cdec4.firebaseapp.com",
  projectId:"healthops-cdec4",
  storageBucket:"healthops-cdec4.firebasestorage.app",
  messagingSenderId:"119682739179",
  appId:"1:119682739179:web:healthops_admin"
});
const auth=getAuth(app);
const db=getFirestore(app);

/* ─── helpers ─────────────────────────────────── */
const fmtDate=ts=>{
  if(!ts)return"—";
  const d=ts.toDate?ts.toDate():new Date(ts);
  return d.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});
};
const pColor=p=>({
  high:{bg:"#FEF0F0",tx:"#B91C1C",dot:"#DC3545"},
  medium:{bg:"#FFFBEB",tx:"#92400E",dot:"#D97706"},
  low:{bg:"#EFF6FF",tx:"#1E40AF",dot:"#2563EB"},
}[p]||{bg:"#F3F4F6",tx:"#374151",dot:"#6B7280"});
const h=(tag,css,html,attrs={})=>{
  const e=document.createElement(tag);
  if(css)e.style.cssText=css;
  if(html)e.innerHTML=html;
  Object.entries(attrs).forEach(([k,v])=>k!=="style"&&k!=="html"&&e.setAttribute(k,v));
  return e;
};
const q=(id)=>document.getElementById(id);

/* ─── state ───────────────────────────────────── */
let S={
  user:null,role:null,staff:[],tasks:[],medicines:[],resources:[],
  loading:true,authLoading:false,loginErr:"",
  view:"dashboard",
  modal:false,mForm:{title:"",to:"",patient:"",priority:"medium",notes:""},mErr:"",mSaving:false,
  fStaff:"all",fPriority:"all",fStatus:"all",
  toast:null,confirmDel:null,
};
let unsubTasks=null;
const R=()=>{const root=document.getElementById("root");root.innerHTML="";root.appendChild(build());};

/* ─── firebase ops ────────────────────────────── */
onAuthStateChanged(auth,async user=>{
  if(user){
    const snap=await getDoc(doc(db,"users",user.uid));
    const data=snap.exists()?snap.data():{};
    S.role=data.role||"staff";
    if(S.role!=="admin"){
      await signOut(auth);
      S.loginErr="Access denied. This account is not an admin.";
      S.user=null;S.loading=false;
    }else{
      S.user=user;S.loginErr="";
      await loadStaff();
      subscribeToTasks();
      S.loading=false;
    }
  }else{
    S.user=null;S.role=null;S.loading=false;
    if(unsubTasks){unsubTasks();unsubTasks=null;}
  }
  R();
});

async function doLogin(email,pass){
  S.authLoading=true;S.loginErr="";R();
  try{await signInWithEmailAndPassword(auth,email,pass);}
  catch(e){
    S.authLoading=false;
    S.loginErr=["auth/invalid-credential","auth/user-not-found","auth/wrong-password"].includes(e.code)
      ?"Invalid email or password.":e.message;
    R();
  }
}
async function doLogout(){
  await signOut(auth);
  S={...S,user:null,role:null,staff:[],tasks:[],view:"dashboard"};
  R();
}
async function loadStaff(){
  const snap=await getDocs(query(collection(db,"users"),where("role","==","staff")));
  S.staff=snap.docs.map(d=>({id:d.id,...d.data()}));
}
function subscribeToTasks(){
  if(unsubTasks)unsubTasks();
  unsubTasks=onSnapshot(query(collection(db,"tasks"),orderBy("createdAt","desc")),snap=>{
    S.tasks=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(!S.loading)R();
  });
}
async function saveTask(){
  const{title,to,patient,priority,notes}=S.mForm;
  if(!title.trim()){S.mErr="Task title is required.";R();return;}
  if(!to){S.mErr="Please select a staff member.";R();return;}
  const sm=S.staff.find(s=>s.id===to);
  S.mSaving=true;S.mErr="";R();
  try{
    await addDoc(collection(db,"tasks"),{
      title:title.trim(),assignedTo:to,
      assignedToEmail:sm?.email||"",
      patient:patient.trim(),priority,
      notes:notes.trim(),isDone:false,
      createdAt:serverTimestamp(),
      createdBy:S.user.email,
    });
    S.modal=false;
    S.mForm={title:"",to:"",patient:"",priority:"medium",notes:""};
    toast("Task assigned successfully!","success");
  }catch(e){S.mErr="Failed: "+e.message;}
  S.mSaving=false;R();
}
async function delTask(id){
  await deleteDoc(doc(db,"tasks",id));
  S.confirmDel=null;
  toast("Task deleted.","info");
}
async function toggleDone(id,cur){
  await updateDoc(doc(db,"tasks",id),{isDone:!cur});
}
function toast(msg,type="success"){
  S.toast={msg,type};R();
  setTimeout(()=>{S.toast=null;R();},3000);
}

/* ─── builder ─────────────────────────────────── */
function build(){
  if(S.loading)return buildLoading();
  if(!S.user)return buildAuth();
  return buildApp();
}

/* ── loading ── */
function buildLoading(){
  const w=h("div","min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--gp)");
  w.innerHTML=`<div style="text-align:center">
    <div style="width:44px;height:44px;border:3px solid rgba(255,255,255,0.15);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px"></div>
    <p style="color:rgba(255,255,255,0.6);font-size:13px">Loading HealthOps…</p>
  </div>`;
  return w;
}

/* ── auth ── */
function buildAuth(){
  const w=h("div","min-height:100vh;display:flex");

  /* left panel */
  const left=h("div","flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;background:var(--gp)");
  left.innerHTML=`
    <div style="max-width:340px;width:100%">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:40px">${logo(40)}<div>
        <div style="color:#fff;font-size:20px;font-weight:700;letter-spacing:-0.4px">HealthOps</div>
        <div style="color:var(--gm);font-size:12px;font-weight:500;letter-spacing:0.5px;text-transform:uppercase">Admin Portal</div>
      </div></div>
      <h1 style="color:#fff;font-size:26px;font-weight:700;line-height:1.3;margin-bottom:14px">Manage your<br/>healthcare operations</h1>
      <p style="color:rgba(255,255,255,0.55);font-size:14px;line-height:1.75;margin-bottom:32px">Assign tasks to staff, monitor duty progress, and keep your ward running smoothly from one centralised portal.</p>
      <div style="display:flex;flex-direction:column;gap:12px">
        ${feat("Assign tasks to staff in real time")}
        ${feat("Monitor completion across all wards")}
        ${feat("Manage staff members and workloads")}
      </div>
    </div>`;

  /* right panel */
  const right=h("div","flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;background:#fff");
  const card=h("div","width:100%;max-width:400px");

  card.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:36px">${logo(32)}
      <span style="font-size:17px;font-weight:700;color:var(--tx)">HealthOps <span style="color:var(--t3);font-weight:400">Admin</span></span>
    </div>
    <h2 style="font-size:22px;font-weight:700;margin-bottom:6px;color:var(--tx)">Welcome back</h2>
    <p style="color:var(--t2);margin-bottom:28px;font-size:14px">Sign in with your admin credentials</p>
    ${S.loginErr?`<div style="background:#FEF0F0;border:1px solid #FECACA;color:#B91C1C;padding:10px 14px;border-radius:var(--rs);margin-bottom:16px;font-size:13px;display:flex;align-items:center;gap:8px"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="#B91C1C" stroke-width="1.3"/><path d="M7 4v3M7 9.5h.01" stroke="#B91C1C" stroke-width="1.3" stroke-linecap="round"/></svg>${S.loginErr}</div>`:""}
    <div style="margin-bottom:16px">
      <label style="display:block;font-size:13px;font-weight:500;color:var(--t2);margin-bottom:6px">Email address</label>
      <input id="lEmail" type="email" placeholder="admin@hospital.com" autocomplete="email"
        style="width:100%;padding:11px 14px;border:1.5px solid var(--bd2);border-radius:var(--rs);font-size:14px;color:var(--tx);background:#fff;transition:border-color .15s"
        onfocus="this.style.borderColor='var(--g)'" onblur="this.style.borderColor='var(--bd2)'"/>
    </div>
    <div style="margin-bottom:24px">
      <label style="display:block;font-size:13px;font-weight:500;color:var(--t2);margin-bottom:6px">Password</label>
      <input id="lPass" type="password" placeholder="••••••••" autocomplete="current-password"
        style="width:100%;padding:11px 14px;border:1.5px solid var(--bd2);border-radius:var(--rs);font-size:14px;color:var(--tx);background:#fff;transition:border-color .15s"
        onfocus="this.style.borderColor='var(--g)'" onblur="this.style.borderColor='var(--bd2)'"/>
    </div>`;

  const btn=h("button",`width:100%;padding:13px;background:var(--g);color:#fff;font-size:15px;font-weight:600;border-radius:var(--rs);transition:background .15s;opacity:${S.authLoading?.7:1};cursor:${S.authLoading?"not-allowed":"pointer"}`);
  btn.textContent=S.authLoading?"Signing in…":"Sign in";
  btn.onmouseover=()=>{if(!S.authLoading)btn.style.background="var(--gd)";};
  btn.onmouseout=()=>{btn.style.background="var(--g)";};
  btn.onclick=()=>{
    if(S.authLoading)return;
    doLogin(q("lEmail")?.value||"",q("lPass")?.value||"");
  };
  card.appendChild(btn);

  const hint=h("p","margin-top:18px;text-align:center;font-size:12px;color:var(--t3)");
  hint.textContent='Only Firestore users with role = "admin" can sign in.';
  card.appendChild(hint);
  right.appendChild(card);
  w.appendChild(left);w.appendChild(right);

  setTimeout(()=>{
    ["lEmail","lPass"].forEach(id=>{
      const inp=q(id);
      if(inp)inp.addEventListener("keydown",e=>{if(e.key==="Enter")btn.click();});
    });
  },50);
  return w;
}
const feat=t=>`<div style="display:flex;align-items:center;gap:10px">
  <div style="width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;flex-shrink:0">
    <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5l2 2 4-4" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <span style="color:rgba(255,255,255,0.7);font-size:14px">${t}</span>
</div>`;

/* ── main app ── */
function buildApp(){
  const w=h("div","display:flex;min-height:100vh");
  w.appendChild(buildSidebar());
  const main=h("div","flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden");
  main.appendChild(buildTopbar());
  const content=h("div","flex:1;overflow-y:auto;padding:28px");
  content.appendChild(buildView());
  main.appendChild(content);
  w.appendChild(main);
  if(S.modal)w.appendChild(buildModal());
  if(S.confirmDel)w.appendChild(buildConfirm());
  if(S.toast)w.appendChild(buildToast());
  return w;
}

/* ── sidebar ── */
function buildSidebar(){
  const s=h("div","width:236px;background:var(--gp);display:flex;flex-direction:column;flex-shrink:0");

  const lh=h("div","padding:22px 18px 18px;border-bottom:1px solid rgba(255,255,255,0.08)");
  lh.innerHTML=`<div style="display:flex;align-items:center;gap:10px">${logo(34)}<div>
    <div style="color:#fff;font-size:15px;font-weight:700">HealthOps</div>
    <div style="color:var(--gm);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px">Admin Portal</div>
  </div></div>`;
  s.appendChild(lh);

  const nav=h("nav","flex:1;padding:14px 10px");
  [
    {id:"dashboard",ic:icGrid(),lb:"Dashboard"},
    {id:"tasks",ic:icCheck(),lb:"All Tasks"},
    {id:"staff",ic:icUsers(),lb:"Staff Members"},
    {id:"medicine",ic:icPill(),lb:"Medicine Stock"},
    {id:"resources",ic:icBed(),lb:"Resources"}
  ].forEach(({id,ic,lb})=>{
    const active=S.view===id;
    const btn=h("button",`width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rs);margin-bottom:2px;font-size:14px;font-weight:500;transition:all .15s;text-align:left;background:${active?"rgba(255,255,255,0.13)":"transparent"};color:${active?"#fff":"rgba(255,255,255,0.55)"}`);
    btn.innerHTML=ic+`<span>${lb}</span>`;
    if(active){const ind=h("div","width:3px;height:16px;background:var(--gm);border-radius:99px;margin-left:auto");btn.appendChild(ind);}
    btn.onmouseover=()=>{if(!active)btn.style.background="rgba(255,255,255,0.07)";};
    btn.onmouseout=()=>{if(!active)btn.style.background="transparent";};
    btn.onclick=()=>{
      S.view=id;
      if (id === "medicine") loadMedicines(); // Ensure loadMedicines is called
      if (id === "resources") loadResources(); // Ensure loadResources is called
      R();
    };
    nav.appendChild(btn);
  });
  s.appendChild(nav);

  const ft=h("div","padding:14px 10px;border-top:1px solid rgba(255,255,255,0.08)");
  const init=(S.user?.email||"A")[0].toUpperCase();
  ft.innerHTML=`<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--rs);margin-bottom:4px">
    <div style="width:32px;height:32px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;flex-shrink:0">${init}</div>
    <div style="flex:1;min-width:0">
      <div style="color:#fff;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${S.user?.email}</div>
      <div style="color:var(--gm);font-size:11px">Administrator</div>
    </div>
  </div>`;
  const lo=h("button","width:100%;display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:var(--rs);color:rgba(255,255,255,0.45);font-size:13px;font-weight:500;transition:all .15s");
  lo.innerHTML=icLogout()+"<span>Sign out</span>";
  lo.onmouseover=()=>{lo.style.background="rgba(255,255,255,0.07)";lo.style.color="#fff";};
  lo.onmouseout=()=>{lo.style.background="transparent";lo.style.color="rgba(255,255,255,0.45)";};
  lo.onclick=doLogout;
  ft.appendChild(lo);
  s.appendChild(ft);
  return s;
}

/* ── topbar ── */
function buildTopbar(){
  const titles={dashboard:"Dashboard",tasks:"All Tasks",staff:"Staff Members",medicine:"Medicine Stock",resources:"Resources Overview"};
  const t=h("div","background:var(--su);border-bottom:1px solid var(--bd);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0");
  t.innerHTML=`<h1 style="font-size:16px;font-weight:700;color:var(--tx)">${titles[S.view]||""}</h1>`;
  const ab=h("button","display:flex;align-items:center;gap:6px;padding:8px 16px;background:var(--g);color:#fff;border-radius:var(--rs);font-size:13px;font-weight:600;transition:background .15s");
  ab.innerHTML=`<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v11M1 6.5h11" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg> Assign Task`;
  ab.onmouseover=()=>ab.style.background="var(--gd)";
  ab.onmouseout=()=>ab.style.background="var(--g)";
  ab.onclick=()=>{S.modal=true;R();};
  t.appendChild(ab);
  return t;
}

/* ── views ── */
function buildView(){
  const w=h("div","");w.classList.add("ani");
  if(S.view==="dashboard")w.appendChild(vDashboard());
  else if(S.view==="tasks")w.appendChild(vTasks());
  else if(S.view==="staff")w.appendChild(vStaff());
  else if(S.view==="medicine")w.appendChild(buildMedicineTab());
  else if(S.view==="resources")w.appendChild(buildResourcesTab());
  return w;
}

/* dashboard */
function vDashboard(){
  const frag=document.createDocumentFragment();
  const total=S.tasks.length,done=S.tasks.filter(t=>t.isDone).length;
  const pct=total?Math.round(done/total*100):0;
  const hi=S.tasks.filter(t=>!t.isDone&&t.priority==="high").length;

  /* stat strip */
  const stats=h("div","display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px");
  [
    {lb:"Total Tasks",val:total,c:"var(--g)"},
    {lb:"Completed",val:done,c:"#2563EB"},
    {lb:"Pending",val:total-done,c:"var(--am)"},
    {lb:"High Priority",val:hi,c:"var(--rd)"},
    {lb:"Staff Members",val:S.staff.length,c:"#7C3AED"},
    {lb:"Completion",val:pct+"%",c:"var(--gd)"},
  ].forEach(({lb,val,c})=>{
    const sc=h("div","background:var(--su);border:1px solid var(--bd);border-radius:var(--r);padding:18px 20px;transition:box-shadow .15s");
    sc.onmouseover=()=>sc.style.boxShadow="var(--shm)";
    sc.onmouseout=()=>sc.style.boxShadow="none";
    sc.innerHTML=`<div style="font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px">${lb}</div>
    <div style="font-size:28px;font-weight:700;color:${c}">${val}</div>`;
    stats.appendChild(sc);
  });
  frag.appendChild(stats);

  /* two-col grid */
  const grid=h("div","display:grid;grid-template-columns:1fr 1fr;gap:20px");

  /* recent tasks */
  const rc=sectionCard("Recent Tasks",5);
  const recent=S.tasks.slice(0,6);
  if(!recent.length){rc.appendChild(empty("No tasks yet"));}
  else recent.forEach(t=>{
    const c=pColor(t.priority||"medium");
    const row=h("div","display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bd)");
    row.innerHTML=`<div style="width:8px;height:8px;border-radius:50%;background:${c.dot};flex-shrink:0"></div>
    <div style="flex:1;min-width:0">
      <div style="font-size:13px;font-weight:500;color:${t.isDone?"var(--t3)":"var(--tx)"};text-decoration:${t.isDone?"line-through":"none"};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.title}</div>
      <div style="font-size:11px;color:var(--t3)">${t.assignedToEmail||"Unassigned"}</div>
    </div>
    <div style="font-size:11px;padding:2px 8px;border-radius:99px;background:${t.isDone?"var(--gl)":"var(--bg)"};color:${t.isDone?"var(--gd)":"var(--t3)"};">${t.isDone?"Done":"Pending"}</div>`;
    rc.appendChild(row);
  });
  grid.appendChild(rc);

  /* staff overview */
  const sc2=sectionCard("Staff Overview");
  if(!S.staff.length){sc2.appendChild(empty("No staff found"));}
  else S.staff.slice(0,7).forEach(s=>{
    const st=S.tasks.filter(t=>t.assignedTo===s.id);
    const dn=st.filter(t=>t.isDone).length;
    const p=st.length?Math.round(dn/st.length*100):0;
    const row=h("div","display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd)");
    row.innerHTML=`<div style="width:34px;height:34px;border-radius:50%;background:var(--gl);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--gd);flex-shrink:0">${(s.email||"S")[0].toUpperCase()}</div>
    <div style="flex:1;min-width:0">
      <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--tx)">${s.email}</div>
      <div style="font-size:11px;color:var(--t3)">${st.length} task${st.length!==1?"s":""} · ${dn} done</div>
    </div>
    <div style="font-size:12px;font-weight:700;color:var(--g)">${p}%</div>`;
    sc2.appendChild(row);
  });
  grid.appendChild(sc2);
  frag.appendChild(grid);
  const d=h("div","");d.appendChild(frag);return d;
}

/* all tasks */
function vTasks(){
  const wrap=h("div","");

  /* filters */
  const fb=h("div","background:var(--su);border:1px solid var(--bd);border-radius:var(--r);padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap");

/* ── resources ── */
async function loadResources(){
  try{
    console.log("Loading resources from Firestore...");
    let allResources=[];
    
    // Known resource types to fetch
    const resourceTypes=["beds","equipment","icu","ventilator"];
    
    for(const resourceType of resourceTypes){
      try{
        console.log("Processing resource type:",resourceType);
        
        // Direct path: resources > [resourceType] > bed_list
        const bedListRef=collection(db,"resources",resourceType,"bed_list");
        const bedListSnap=await getDocs(bedListRef);
        console.log(`Items found in ${resourceType}:`,bedListSnap.docs.length);
        
        if(bedListSnap.docs.length>0){
          const items=bedListSnap.docs.map(d=>{
            const data=d.data();
            console.log(`Item ${d.id}:`,data);
            console.log(`  occupied value:`,data.occupied,"(type:",typeof data.occupied,")");
            return {id:d.id,...data};
          });
          
          // Check for occupied status - handle boolean, string, or number
          const occupied=items.filter(i=>{
            const occ=i.occupied;
            return occ===true || occ==="true" || occ===1 || occ==="1";
          }).length;
          const empty=items.length-occupied;
          
          console.log(`${resourceType}: Total=${items.length}, Occupied=${occupied}, Empty=${empty}`);
          
          allResources.push({
            resourceType,
            totalCount:items.length,
            occupied,
            empty,
            items
          });
        }
      }catch(subErr){
        console.warn(`Could not fetch ${resourceType}:`,subErr.message);
      }
    }
    
    S.resources=allResources;
    console.log("Total resources loaded:",S.resources.length);
    console.log("Loaded resources:",S.resources);
    R();
  }catch(e){
    console.error("Error loading resources:",e);
    console.error("Error code:",e.code,"Message:",e.message);
  }
}

      resource.items.forEach(item=>{
        const isOccupied=item.occupied===true;
        const itemBadge=h("div",`background:${isOccupied?"var(--ab)":"var(--bb)"};border:1px solid var(--bd);border-radius:var(--rs);padding:10px;text-align:center;font-size:11px;font-weight:600;color:${isOccupied?"var(--am)":"var(--bl)"}`);
        itemBadge.textContent=`${item.id}\\n${isOccupied?"Occupied":"Empty"}`;
        itemsList.appendChild(itemBadge);
      });
      typeCard.appendChild(itemsList);
    }
    
    container.appendChild(typeCard);
  });
  
  return container;
}

/* ── medicine stock ── */
async function loadMedicines(){
  try{
    console.log("Loading medicines from Firestore...");
    const snap=await getDocs(collection(db,"medicines"));
    console.log("Snapshot docs count:",snap.docs.length);
    S.medicines=snap.docs.map(d=>{
      const data=d.data();
      console.log("Medicine data:",data);
      return {id:d.id,...data};
    });
    console.log("Loaded medicines:",S.medicines);
    R();
  }catch(e){
    console.error("Error loading medicines:",e);
    alert("Error loading medicines: "+e.message);
  }
}

function buildMedicineTab(){
  const container=h("div","background:var(--su);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden");
  if(!S.medicines.length){
    const msg=h("div","padding:20px;text-align:center;color:var(--t3);font-size:13px");
    msg.innerHTML=`<p style="color:var(--t2);margin-bottom:10px">No medicines found in Firestore collection 'medicines'.</p>
    <p style="color:var(--t3);font-size:12px">Check browser console (F12) for debugging details.</p>
    <p style="color:var(--t3);font-size:12px">Ensure your Firestore has a 'medicines' collection with 'medicine_name' and 'quantity' fields.</p>`;
    container.appendChild(msg);
    return container;
  }
  const table=h("table","width:100%;border-collapse:collapse");
  const headerRow=h("tr","background:var(--su2);border-bottom:1px solid var(--bd)");
  ["Medicine Name","Quantity","Threshold","Status"].forEach(text=>{
    const th=h("th","padding:12px 14px;text-align:left;font-size:13px;font-weight:600;color:var(--tx);border-right:1px solid var(--bd)");
    th.textContent=text;
    headerRow.appendChild(th);
  });
  table.appendChild(headerRow);
  S.medicines.forEach(med=>{
    const row=h("tr","border-bottom:1px solid var(--bd)");
    const quantity=med.quantity||0;
    const threshold=med.low_stock_threshold||10;
    let status="In Stock",statusColor="var(--g)";
    if(quantity<threshold){status="Low Stock Alert";statusColor="var(--rd)";}else if(quantity<threshold*5){status="Restock Soon";statusColor="var(--am)";}
    const cells=[med.medicine_name||"N/A",quantity,threshold,`<span style='color:${statusColor};font-weight:600'>${status}</span>`];
    cells.forEach((text,idx)=>{
      const td=h("td",`padding:12px 14px;border-right:1px solid var(--bd);font-size:13px;color:${idx===3?"":"var(--tx)"}`);
      td.innerHTML=text;
      row.appendChild(td);
    });
    table.appendChild(row);
  });
  container.appendChild(table);
  return container;
}

/* ── shared components ── */
function sectionCard(title){
  const c=h("div","background:var(--su);border:1px solid var(--bd);border-radius:var(--r);padding:20px");

  hd.textContent=title;c.appendChild(hd);return c;
}
